<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Sign In • M-PESA Spending Analyzer</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body class="app-bg">
    <nav class="navbar navbar-expand-lg border-bottom border-secondary-subtle bg-body-tertiary sticky-top">
      <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-2" href="./auth.html" aria-label="M-PESA Spending Analyzer">
          <span class="app-logo" aria-hidden="true">M</span>
          <span class="fw-semibold">M-PESA Spending Analyzer</span>
        </a>

        <div class="ms-auto d-flex align-items-center gap-2">
          <span id="apiPill" class="badge rounded-pill text-bg-secondary d-inline-flex align-items-center gap-2">
            <span id="apiDot" class="app-status-dot" aria-hidden="true"></span>
            <span id="apiText">API: checking…</span>
          </span>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row g-4">
        <div class="col-12">
          <h1 class="h4 mb-1">Account Access</h1>
          <p class="text-secondary small mb-0">Create an account or sign in to continue.</p>
        </div>

        <div class="col-12 col-lg-6">
          <section class="card bg-body-tertiary border-secondary-subtle shadow-sm h-100">
            <div class="card-body">
              <h2 class="h6 mb-3">Register</h2>
              <div class="vstack gap-2">
                <label class="form-label mb-0" for="registerEmail">Email</label>
                <input id="registerEmail" class="form-control" type="email" autocomplete="email" />

                <label class="form-label mb-0 mt-2" for="registerUsername">Username</label>
                <input
                  id="registerUsername"
                  class="form-control"
                  type="text"
                  autocomplete="username"
                  placeholder="letters, numbers, ., _, -"
                />

                <label class="form-label mb-0 mt-2" for="registerPassword">Password</label>
                <input
                  id="registerPassword"
                  class="form-control"
                  type="password"
                  autocomplete="new-password"
                  minlength="8"
                />
              </div>

              <div class="d-flex gap-2 mt-3">
                <button id="btnRegister" class="btn btn-primary" type="button">Register</button>
              </div>

              <pre id="registerOutput" class="app-output mt-3 mb-0"></pre>
            </div>
          </section>
        </div>

        <div class="col-12 col-lg-6">
          <section class="card bg-body-tertiary border-secondary-subtle shadow-sm h-100">
            <div class="card-body">
              <h2 class="h6 mb-3">Sign In</h2>
              <div class="vstack gap-2">
                <label class="form-label mb-0" for="loginIdentifier">Email or username</label>
                <input
                  id="loginIdentifier"
                  class="form-control"
                  type="text"
                  autocomplete="username"
                  placeholder="you@example.com or username"
                />

                <label class="form-label mb-0 mt-2" for="loginPassword">Password</label>
                <input id="loginPassword" class="form-control" type="password" autocomplete="current-password" />
              </div>

              <div class="d-flex gap-2 mt-3">
                <button id="btnLogin" class="btn btn-primary" type="button">Sign In</button>
              </div>

              <pre id="loginOutput" class="app-output mt-3 mb-0"></pre>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="./app.js"></script>
    <script src="./init.js"></script>
    <script src="./auth.js"></script>
  </body>
</html>
