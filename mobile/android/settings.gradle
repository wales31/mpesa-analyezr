import org.gradle.api.GradleException

pluginManagement {
  repositories {
    gradlePluginPortal()
    google()
    mavenCentral()
  }

  def findExistingDir = { List<File> candidates ->
    for (def candidate : candidates) {
      if (candidate.exists() && candidate.isDirectory()) {
        return candidate.canonicalFile
      }
    }
    return null
  }

  def resolvePackageDir = { String packageRelativePath, String envVarName ->
    def envOverride = System.getenv(envVarName)?.trim()
    def candidates = []

    if (envOverride) {
      candidates.add(new File(envOverride))
    }

    // Supports opening repo root, mobile/, or mobile/android in Android Studio.
    candidates.add(new File(rootDir, "../node_modules/${packageRelativePath}"))
    candidates.add(new File(rootDir, "../../node_modules/${packageRelativePath}"))
    candidates.add(new File(rootDir, "../../../node_modules/${packageRelativePath}"))

    def resolved = findExistingDir(candidates)
    if (resolved != null) {
      return resolved
    }

    throw new GradleException(
      "Could not locate '${packageRelativePath}'. Checked: ${candidates*.path}. " +
        "Run 'npm install' or set ${envVarName} to the package directory path."
    )
  }

  def reactNativeGradlePlugin = resolvePackageDir(
    "@react-native/gradle-plugin",
    "REACT_NATIVE_GRADLE_PLUGIN_DIR"
  )
  includeBuild(reactNativeGradlePlugin)

  def expoPluginsPath = resolvePackageDir(
    "expo-modules-autolinking/android/expo-gradle-plugin",
    "EXPO_AUTOLINKING_GRADLE_PLUGIN_DIR"
  )
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv("EXPO_USE_COMMUNITY_AUTOLINKING") == "1") {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
  }
}

expoAutolinking.useExpoModules()
expoAutolinking.useExpoVersionCatalog()

rootProject.name = "M-PESA Analyzer Mobile"

include(":app")
includeBuild(expoAutolinking.reactNativeGradlePlugin)
